<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>A Little Something For Hannah 🐾</title>
<style>
  :root{
    --pink: #ffd6e8;
    --pink-deep: #f6a6c9;
    --lavender: #e3d6ff;
    --lavender-deep: #c3a8f8;
    --text: #5b4b66;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(160deg, var(--pink) 0%, var(--lavender) 55%, var(--lavender-deep) 100%);
    color: var(--text);
    overflow-x:hidden;
  }
  .wrap{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 32px 18px 60px;
    text-align:center;
    position:relative;
  }
  .paws{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .paw{
    position:absolute;
    font-size: 22px;
    opacity:0.25;
    animation: float 14s linear infinite;
  }
  @keyframes float{
    0%{ transform: translateY(110vh) rotate(0deg); }
    100%{ transform: translateY(-10vh) rotate(360deg); }
  }
  h1{
    font-size: clamp(26px, 6vw, 38px);
    margin: 0 0 6px;
    z-index:1;
  }
  .subtitle{
    font-size: clamp(14px, 3.6vw, 17px);
    opacity:0.85;
    margin-bottom: 28px;
    z-index:1;
    max-width: 320px;
  }
  .card{
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(6px);
    border-radius: 24px;
    padding: 28px 22px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 10px 30px rgba(195, 168, 248, 0.35);
    z-index:1;
    margin-bottom: 22px;
  }
  .card .emoji{
    font-size: 52px;
    display:block;
    margin-bottom: 14px;
    animation: pop 0.5s ease;
  }
  @keyframes pop{
    0%{ transform: scale(0.6); opacity:0; }
    100%{ transform: scale(1); opacity:1; }
  }
  .card p{
    font-size: clamp(16px, 4vw, 19px);
    line-height: 1.5;
    margin: 0;
    min-height: 70px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  button{
    border:none;
    background: linear-gradient(135deg, var(--pink-deep), var(--lavender-deep));
    color: white;
    font-size: 17px;
    font-weight:600;
    padding: 14px 30px;
    border-radius: 999px;
    cursor:pointer;
    box-shadow: 0 8px 18px rgba(195, 168, 248, 0.5);
    transition: transform 0.15s ease;
    z-index:1;
    -webkit-tap-highlight-color: transparent;
  }
  button:active{
    transform: scale(0.95);
  }
  .counter{
    margin-top:14px;
    font-size: 13px;
    opacity:0.7;
    z-index:1;
  }
  .footnote{
    margin-top: 34px;
    font-size: 13px;
    opacity:0.75;
    max-width: 300px;
    z-index:1;
    line-height:1.5;
  }
  .sparkle{
    position:absolute;
    font-size:14px;
    animation: sparkle-fade 1s ease forwards;
    pointer-events:none;
    z-index:2;
  }
  @keyframes sparkle-fade{
    0%{ opacity:1; transform: translateY(0) scale(1); }
    100%{ opacity:0; transform: translateY(-40px) scale(1.3); }
  }
</style>
</head>
<body>

<div class="paws" id="paws"></div>

<div class="wrap">
  <h1>Hi Hannah 🐶🐱</h1>
  <div class="subtitle">a tiny secret corner just for you, full of hugs and good vibes</div>

  <div class="card">
    <span class="emoji" id="emoji">🤗</span>
    <p id="message">Tap the button below for a little hug.</p>
  </div>

  <button id="hugBtn">Send me a hug 🐾</button>
  <div class="counter" id="counter">hugs received: 0</div>

  <div class="footnote">
    ito pa lng for now, wait ka lng~ 🐾<br/>
    more cute stuff coming soon, just for you.
  </div>
</div>

<script>
const messages = [
  ["🤗", "Sending you the biggest, warmest hug right now."],
  ["🐶", "A golden retriever just wagged its tail extra hard, thinking of you."],
  ["🐱", "Somewhere a cat is purring, and it's basically you-shaped happiness."],
  ["🌸", "You're doing better than you think. Keep going."],
  ["☁️", "Take a deep breath. You're allowed to rest today."],
  ["🐾", "Pawsitive vibes incoming, no cap."],
  ["✨", "You make ordinary days feel a little brighter."],
  ["🦴", "Here's a virtual treat, just because you deserve one."],
  ["🌻", "Whatever today threw at you, you handled it. Proud of you."],
  ["🐕", "Imagine the fluffiest puppy running up to greet you. That's this message."],
  ["🐈", "A tiny cat headbutt of support, delivered straight to your phone."],
  ["💪", "You're tougher than you give yourself credit for."],
  ["🍵", "Go grab something warm to drink. You've earned a little break."],
  ["🌈", "Rough moments pass. You always find your way back to okay."],
  ["🐾", "Sending paw-shaped good energy your way."],
  ["🐩", "A whole squad of good dogs is rooting for you today."],
  ["🐈‍⬛", "Even grumpy cats approve of how hard you're trying."],
  ["🫶", "You don't have to be 'on' all the time. It's okay to just be."],
  ["🌙", "However today went, you made it through. That counts."],
  ["🐇", "Soft, gentle, and entirely on your side — that's this message."]
];

const emoji = document.getElementById('emoji');
const message = document.getElementById('message');
const btn = document.getElementById('hugBtn');
const counterEl = document.getElementById('counter');
let count = 0;
let lastIndex = -1;

function randomMessage(){
  let i;
  do { i = Math.floor(Math.random() * messages.length); } while (i === lastIndex);
  lastIndex = i;
  return messages[i];
}

function spawnSparkles(){
  for(let i=0;i<6;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = ['✨','🐾','💫','🌸'][Math.floor(Math.random()*4)];
    s.style.left = (40 + Math.random()*20) + '%';
    s.style.top = (35 + Math.random()*10) + '%';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

btn.addEventListener('click', () => {
  const [e, m] = randomMessage();
  emoji.style.animation = 'none';
  requestAnimationFrame(() => { emoji.style.animation = 'pop 0.5s ease'; });
  emoji.textContent = e;
  message.textContent = m;
  count++;
  counterEl.textContent = 'hugs received: ' + count;
  spawnSparkles();
});

// floating background paw prints
const pawsContainer = document.getElementById('paws');
const pawEmojis = ['🐾','🐶','🐱'];
for(let i=0;i<14;i++){
  const p = document.createElement('div');
  p.className = 'paw';
  p.textContent = pawEmojis[Math.floor(Math.random()*pawEmojis.length)];
  p.style.left = Math.random()*100 + '%';
  p.style.animationDuration = (10 + Math.random()*10) + 's';
  p.style.animationDelay = (Math.random()*10) + 's';
  pawsContainer.appendChild(p);
}
</script>

</body>
</html>
